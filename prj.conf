# This file contains selected Kconfig options for the application.

CONFIG_SPEED_OPTIMIZATIONS=y
#CONFIG_DEBUG_THREAD_INFO=y
#CONFIG_ASSERT=y
#CONFIG_REBOOT=y
#CONFIG_CRC=y

CONFIG_FPU=y

# Fuel gauge
CONFIG_NRF_FUEL_GAUGE=y
CONFIG_NRF_FUEL_GAUGE_VARIANT_PRIMARY_CELL=y

# Serial and logging
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=n

CONFIG_LOG=y

CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_REQUIRES_FLOAT_PRINTF=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=2048
CONFIG_LOG_BACKEND_RTT_BUFFER_SIZE=2048

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Event manager
# CONFIG_APP_EVENT_MANAGER=y
# CONFIG_APP_EVENT_MANAGER_LOG_LEVEL_OFF=y
# CONFIG_CAF=y
# CONFIG_CAF_LEDS=y
# CONFIG_CAF_LEDS_PWM=y
# CONFIG_CAF_PM_EVENTS=y
# CONFIG_CAF_SENSOR_EVENTS=y

# CONFIG_CAF_INIT_LOG_MODULE_STATE_EVENTS=n
# CONFIG_CAF_INIT_LOG_SENSOR_EVENTS=n
# CONFIG_CAF_INIT_LOG_LED_EVENTS=n

# Drivers
CONFIG_SENSOR=y
CONFIG_REGULATOR=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_PWM=y

# BT
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Seeed nPM2100+nRF54L15"
CONFIG_BT_NSMS=y
CONFIG_DK_LIBRARY=y
CONFIG_BT_BAS=y

CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
