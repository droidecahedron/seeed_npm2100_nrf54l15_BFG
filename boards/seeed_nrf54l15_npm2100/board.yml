board:
  name: seeed_nrf54l15_npm2100
  full_name: Seeed nRF54L15 & nPM2100 Reference Design
  vendor: nordic
  socs:
    - name: nrf54l15
      variants:
        - name: xip
          cpucluster: cpuflpr
        - name: ns
          cpucluster: cpuapp
runners:
  run_once:
    '--recover':
      - runners:
          - nrfjprog
          - nrfutil
        run: first
        groups:
          - boards:
              - seeed_nrf54l15_npm2100/nrf54l15/cpuapp
              - seeed_nrf54l15_npm2100/nrf54l15/cpuapp/ns
              - seeed_nrf54l15_npm2100/nrf54l15/cpuflpr
              - seeed_nrf54l15_npm2100/nrf54l15/cpuflpr/xip
    '--erase':
      - runners:
          - nrfjprog
          - jlink
          - nrfutil
        run: first
        groups:
          - boards:
              - seeed_nrf54l15_npm2100/nrf54l15/cpuapp
              - seeed_nrf54l15_npm2100/nrf54l15/cpuapp/ns
              - seeed_nrf54l15_npm2100/nrf54l15/cpuflpr
              - seeed_nrf54l15_npm2100/nrf54l15/cpuflpr/xip
    '--reset':
      - runners:
          - nrfjprog
          - jlink
          - nrfutil
        run: last
        groups:
          - boards:
              - seeed_nrf54l15_npm2100/nrf54l15/cpuapp
              - seeed_nrf54l15_npm2100/nrf54l15/cpuapp/ns
              - seeed_nrf54l15_npm2100/nrf54l15/cpuflpr
              - seeed_nrf54l15_npm2100/nrf54l15/cpuflpr/xip
